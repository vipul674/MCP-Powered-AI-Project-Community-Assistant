version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile

    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    # Remove this extra_hosts if you don't need it, but keeping it is fine.

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile

    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
      